<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Task Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 Todo Task Manager</h1>
            <p class="subtitle">DevSecOps Application</p>
        </div>

        <div class="input-section">
            <form id="todoForm">
                <div class="form-group">
                    <input 
                        type="text" 
                        id="titleInput" 
                        placeholder="Enter task title..." 
                        required
                    >
                </div>
                <div class="form-group">
                    <textarea 
                        id="descriptionInput" 
                        placeholder="Enter task description (optional)..." 
                        rows="3"
                    ></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Add Todo</button>
            </form>
        </div>

        <div class="status-bar">
            <span>Total Tasks: <strong id="totalCount">0</strong></span>
            <span>Completed: <strong id="completedCount">0</strong></span>
            <span>Pending: <strong id="pendingCount">0</strong></span>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <div class="todos-container">
            <div id="todosList" class="todos-list">
                <!-- Todos will be inserted here -->
            </div>
            <div id="emptyState" class="empty-state">
                <p>📭 No tasks yet. Add one to get started!</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
